name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Wait for branch-based Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..30}; do
            status=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${GITHUB_SHA}&per_page=20" \
              --jq '[.workflow_runs[] | select(.name == "pages build and deployment")][0].status // "missing"')
            if [ "$status" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Branch-based Pages deployment was not found; continuing."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
